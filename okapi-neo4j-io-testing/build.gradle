description = 'Okapi - Neo4j IO test utils'

dependencies {
    api project(':okapi-neo4j-io')
    api project(':okapi-testing')

    implementation group: 'org.neo4j.driver', name: 'neo4j-java-driver', version: ver.neo4j.driver
    implementation group: 'org.bouncycastle', name: 'bctls-jdk18on', version: ver.bctls
    implementation group: 'org.scalatest', name: "scalatest".scala(), version: ver.scalatest
    implementation group: 'org.scalatestplus', name: "mockito-5-18".scala(), version: "${ver.scalatest}.0"
    implementation group: 'org.neo4j.test', name: 'neo4j-harness',            version: ver.neo4j.harness
    implementation group: 'org.neo4j.test', name: 'neo4j-harness-enterprise', version: ver.neo4j.harness
}

// We ignore the license check here for unknown historic reasons.
tasks.named("validateLicenses") {
    enabled = false
}
